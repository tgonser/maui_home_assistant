# =============================================================================
# Maui Solar Tier Matrix  —  cooling targets per house mode x solar tier
# =============================================================================
# Paste into your packages folder (or configuration.yaml under the matching
# keys). Defines:
#   1. sensor.maui_solar_tier  — Poor / Fair / Good / Strong / Excellent from
#      sensor.total_solar (kW):  <=5 Poor, <=10 Fair, <=15 Good, <=20 Strong,
#      >20 Excellent.
#   2. 45 input_number helpers — the cooling matrix. One target (deg F) per
#      house mode (Owners / Visitors / Vacation) x tier x room group
#      (Master / Sitting / Rest). Editable from the Wall Kiosk settings menu
#      or from HA Settings > Devices & Services > Helpers.
#      NOTE: values are NOT set here (an "initial:" key would reset them on
#      every HA restart). After adding this package, open the Wall Kiosk
#      Settings > Cooling Matrix and tap "Load recommended defaults" once.
# Room groups used by the automation:
#   Master  = climate.master_bed_2
#   Sitting = climate.sitting
#   Rest    = climate.boardroom, climate.beach_room, climate.upper_mauka
#   (Atrium / Bar / Kitchen are NOT in the matrix - doors open; they are still
#    forced OFF during peak 5-9pm.)
# =============================================================================

template:
  - sensor:
      - name: Maui Solar Tier
        unique_id: maui_solar_tier
        icon: mdi:solar-power-variant
        state: >-
          {% set s = states("sensor.total_solar") | float(0) %}
          {% if s <= 5 %}Poor{% elif s <= 10 %}Fair{% elif s <= 15 %}Good{% elif s <= 20 %}Strong{% else %}Excellent{% endif %}

# Manual-hold timers: while a room's timer is running, the climate automation
# leaves that room alone (Owners Home / Visitors modes only — Vacation always
# reclaims control). Started by the "Maui Manual Setpoint Hold" automation
# whenever a person changes a thermostat by hand. restore: true keeps holds
# across HA restarts.
timer:
  maui_hold_master_bed_2:
    name: "Hold: Master Bedroom"
    restore: true
  maui_hold_sitting:
    name: "Hold: Sitting"
    restore: true
  maui_hold_boardroom:
    name: "Hold: Boardroom"
    restore: true
  maui_hold_beach_room:
    name: "Hold: Beach Room"
    restore: true
  maui_hold_upper_mauka:
    name: "Hold: Upper Mauka"
    restore: true

input_number:
  maui_ct_owners_poor_master:
    name: "CT Owners · Poor · Master"
    min: 68
    max: 84
    step: 1
    unit_of_measurement: "°F"
    icon: mdi:thermometer
    mode: box
