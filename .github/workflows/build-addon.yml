name: Build & Push HA Add-on

on:
  push:
    branches: [main]
    paths:
      - "ha-addon/**"
      - "artifacts/api-server/**"
      - "artifacts/ha-yaml/**"
      - "lib/**"
      - ".github/workflows/build-addon.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: PORT=3000 BASE_PATH=/ pnpm --filter @workspace/ha-yaml run build

      - name: Build backend
        run: pnpm --filter @workspace/api-server run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: version
        run: |
          VERSION=$(grep '^version:' ha-addon/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ha-addon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/tgonser/maui_home_assistant/wall-kiosk:${{ steps.version.outputs.version }}
            ghcr.io/tgonser/maui_home_assistant/wall-kiosk:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
