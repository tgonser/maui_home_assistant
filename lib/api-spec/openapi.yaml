openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: roomAliases
    description: Per-area display name overrides for the kiosk
  - name: entityAliases
    description: Per-entity display name overrides for the kiosk
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /room-aliases:
    get:
      operationId: listRoomAliases
      tags: [roomAliases]
      summary: List all room aliases
      responses:
        "200":
          description: All aliases as an object keyed by area_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomAliasMap"
  /room-aliases/{areaId}:
    put:
      operationId: setRoomAlias
      tags: [roomAliases]
      summary: Create or update an alias
      parameters:
        - in: path
          name: areaId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomAliasInput"
      responses:
        "200":
          description: Alias upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomAlias"
    delete:
      operationId: deleteRoomAlias
      tags: [roomAliases]
      summary: Remove an alias
      parameters:
        - in: path
          name: areaId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
  /entity-aliases:
    get:
      operationId: listEntityAliases
      tags: [entityAliases]
      summary: List all entity aliases
      responses:
        "200":
          description: All aliases as an object keyed by entity_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityAliasMap"
  /entity-aliases/{entityId}:
    put:
      operationId: setEntityAlias
      tags: [entityAliases]
      summary: Create or update an entity alias
      parameters:
        - in: path
          name: entityId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityAliasInput"
      responses:
        "200":
          description: Alias upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityAlias"
    delete:
      operationId: deleteEntityAlias
      tags: [entityAliases]
      summary: Remove an entity alias
      parameters:
        - in: path
          name: entityId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RoomAlias:
      type: object
      properties:
        areaId: { type: string }
        name: { type: string }
        updatedAt: { type: string, format: date-time }
      required: [areaId, name, updatedAt]
    RoomAliasInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
      required: [name]
    RoomAliasMap:
      type: object
      additionalProperties: { type: string }
    EntityAlias:
      type: object
      properties:
        entityId: { type: string }
        alias: { type: string }
        updatedAt: { type: string, format: date-time }
      required: [entityId, alias, updatedAt]
    EntityAliasInput:
      type: object
      properties:
        alias: { type: string, minLength: 1, maxLength: 80 }
      required: [alias]
    EntityAliasMap:
      type: object
      additionalProperties: { type: string }
